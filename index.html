<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India – Watch Shows Online, Watch Movies Online</title>
    <link rel="icon" href="assets/images/logo3.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="box">
            <nav>
                <span><img width="53" src="assets/images/logo.svg" alt="Netflix logo"></span>
                <div>
                    <button class="btn1 ">English</button>
                    <button class="btn btn-red-sm">Login In</button>
                </div>
            </nav>
            <div class="hero">
                <span>Enjoy movies, hit series and more from 149 Rs.</span>
                <span>Watch anywhere. Cancel anytime.</span>
                <span>Ready to watch? Enter your email to create or restart your membership.</span>
                <div>
                    <input type="email" placeholder="Email address">
                    <button class="btn btn-red">Get Started &gt;</button>
                </div>
            </div>
            <div class="separation"></div>

        </div>
    </div>

    <section class="first">
        <div>
            <span>Enjoy on your TV</span>
            <span>

                Watch on smart TVs, PlayStation, Xbox, Chromecast, Apple TV, Blu-ray players and more.
            </span>
        </div>
        
        <div class="secImg">
            <img src="assets/images/tv.png" alt="tv">
            <video src="https://web.archive.org/web/20231116163737im_/https://assets.nflxext.com/ffe/siteui/acquisition/ourStory/fuji/desktop/video-tv-0819.m4v" autoplay loops muted></video>

        </div>
        
    </section>

    <video class="sec2-video" data-uia="nmhp-card-animation-asset-video" autoplay="" playsinline="" muted="" loop=""><source src="https://web.archive.org/web/20231116163737im_/https://assets.nflxext.com/ffe/siteui/acquisition/ourStory/fuji/desktop/video-devices.m4v" type="video/mp4"></video> -->
</body>
</html>
